<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .minimize-button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .minimize-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
        
        .minimize-button svg {
            width: 16px;
            height: 16px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }
        
        .status-dot.offline {
            background: #ef4444;
        }
        

        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message.bot .message-avatar {
            background: #e5e7eb;
            color: #374151;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 14px;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .message-content {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
        }
        
        /* 强制 Markdown 渲染后的内容保持原有字体大小 */
        .message-content * {
            font-size: inherit !important;
            line-height: inherit !important;
        }
        
        .message-content p {
            margin: 0.5em 0;
        }
        
        .message-content h1, .message-content h2, .message-content h3, 
        .message-content h4, .message-content h5, .message-content h6 {
            font-size: 12px !important;
            font-weight: 600;
            margin: 0.5em 0;
        }
        
        .message-content ul, .message-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }
        
        .message-content li {
            margin: 0.2em 0;
        }
        
        .message-content strong, .message-content b {
            font-weight: 600;
        }
        
        .message-content em, .message-content i {
            font-style: italic;
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 14px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            max-width: 70%;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .input-container {
            padding: 15px;
            background: white;
            border-top: 1px solid #e5e7eb;
            border-radius: 0 0 12px 12px;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .message-input {
            flex: 1;
            border: 2px solid #e5e7eb;
            border-radius: 18px;
            padding: 8px 14px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease;
            font-family: inherit;
            height: 36px;
            min-height: 36px;
            max-height: 36px;
            overflow: hidden;
            box-sizing: border-box;
            line-height: 20px;
        }
        
        .message-input:focus {
            border-color: #667eea;
        }
        
        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .send-button svg {
            width: 16px;
            height: 16px;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .rag-info {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .rag-info svg {
            width: 16px;
            height: 16px;
        }
        
        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 AI 助手</h2>
            <div class="header-controls">
                <div class="status-indicator">
                    <div class="status-dot" id="connection-status"></div>
                    <span id="status-text">Connecting...</span>
                </div>
                <button class="minimize-button" id="minimize-button" title="最小化">
                    <svg fill="currentColor" viewBox="0 0 20 20" width="16" height="16">
                        <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="messages-container" id="messages-container">
            <!-- Messages will be added here -->
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="message-input" 
                    class="message-input" 
                    placeholder="输入您的问题..."
                    rows="1"
                ></textarea>
                <button id="send-button" class="send-button">
                    <svg fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script>
        // Global variables
        let config = {};
        let conversationHistory = [];
        let isTyping = false;
        let ollamaConnected = false;
        let authToken = null;
        let userId = null;
        
        // DOM elements
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const connectionStatus = document.getElementById('connection-status');
        const statusText = document.getElementById('status-text');

        const minimizeButton = document.getElementById('minimize-button');
        
        // Listen for configuration from parent
        window.addEventListener('message', function(event) {
            if (event.data.type === 'CHATBOT_CONFIG') {
                config = event.data.config;
                authToken = event.data.authToken;
                userId = event.data.userId;
                initializeChat();
            }
        });
        
        // Initialize chat
        function initializeChat() {
            // Apply theme
            if (config.theme && config.theme.primaryColor) {
                document.documentElement.style.setProperty('--primary-color', config.theme.primaryColor);
            }
            
            // Show welcome message
            if (config.welcomeMessage) {
                addMessage('bot', config.welcomeMessage);
            }
            
            // Check Ollama connection
            checkOllamaConnection();
            

            
            // Show authentication status
            updateAuthStatus();
        }
        
        // // Check Ollama connection
        // async function checkOllamaConnection() {
        //     try {
        //         const response = await fetch('http://localhost:11434/api/tags');
        //         if (response.ok) {
        //             ollamaConnected = true;
        //             updateConnectionStatus(true);
        //         } else {
        //             updateConnectionStatus(false);
        //         }
        //     } catch (error) {
        //         updateConnectionStatus(false);
        //     }
        // }
        
        // Update connection status
        function updateConnectionStatus(connected) {
            ollamaConnected = connected;
            connectionStatus.className = `status-dot ${connected ? '' : 'offline'}`;
            statusText.textContent = connected ? 'Connected' : 'Offline';
        }
        

        
        // Update authentication status
        function updateAuthStatus() {
            if (authToken) {
                console.log('✅ Chatbot authenticated');
                // Add auth indicator to status
                const authIndicator = document.createElement('div');
                authIndicator.className = 'rag-status';
                authIndicator.textContent = '🔐 Auth';
                authIndicator.style.background = 'rgba(34, 197, 94, 0.2)';
                authIndicator.style.marginLeft = '8px';
                
                const statusIndicator = document.querySelector('.status-indicator');
                statusIndicator.appendChild(authIndicator);
            } else {
                console.warn('⚠️ Chatbot not authenticated - some features may be limited');
            }
        }
        
        // Get authentication headers
        function getAuthHeaders() {
            const headers = {
                'Content-Type': 'application/json',
            };
            
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }
            
            return headers;
        }
        
        // Add message to chat
        function addMessage(sender, content, ragContext = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = sender === 'user' ? 'U' : '🤖';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';

            if (sender === 'bot') {
                const markdownHtml = marked.parse(content);
                const sanitizedHtml = DOMPurify.sanitize(markdownHtml, {
                    ALLOWED_TAGS: ['p', 'br', 'strong', 'b', 'em', 'i', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'code', 'pre', 'blockquote'],
                    ALLOWED_ATTR: []
                });
                messageContent.innerHTML = sanitizedHtml;
            } else {
                messageContent.textContent = content;
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);
            
            // Add RAG context if available
            if (ragContext && ragContext.length > 0) {
                const contextDiv = document.createElement('div');
                contextDiv.className = 'rag-context';
                contextDiv.innerHTML = `
                    <h4>🔍 RAG Context Found (${ragContext.length} sources)</h4>
                    ${ragContext.map((result, index) => 
                        `<p><strong>Source ${index + 1}:</strong> ${result.title} (${(result.similarity * 100).toFixed(1)}% match)</p>`
                    ).join('')}
                `;
                messageContent.appendChild(contextDiv);
            }
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Add to conversation history
            conversationHistory.push({
                role: sender === 'user' ? 'user' : 'assistant',
                content: content
            });
        }
        
        // Show typing indicator
        function showTypingIndicator() {
            // 移除所有已有的流式/typing bot 气泡
            document.querySelectorAll('.message.bot.typing-indicator, #streaming-message').forEach(el => el.remove());
            let typingDiv = document.getElementById('streaming-message');
            let messageContent;
            if (!typingDiv) {
                typingDiv = document.createElement('div');
                typingDiv.className = 'message bot';
                typingDiv.id = 'streaming-message';
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = '🤖';
                messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                typingDiv.appendChild(avatar);
                typingDiv.appendChild(messageContent);
                messagesContainer.appendChild(typingDiv);
            } else {
                messageContent = typingDiv.querySelector('.message-content');
                if (!messageContent) {
                    messageContent = document.createElement('div');
                    messageContent.className = 'message-content';
                    typingDiv.appendChild(messageContent);
                }
            }
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Hide typing indicator
        function hideTypingIndicator() {
            // 流式结束后不移除气泡，直接保留最终内容
            // 可选：移除id，变为普通bot消息
            const typingDiv = document.getElementById('streaming-message');
            if (typingDiv) {
                typingDiv.removeAttribute('id');
            }
        }
        
        // Send message to Ollama with RAG (流式)
// ✅ 修改后的 sendMessageToOllama + typing bubble复用

async function sendMessageToOllama(userMessage) {
    let ragResults = [];
    let botReply = '';
    const backendUrl = config.backendUrl || 'http://localhost:8001';
    const topK = config.maxRAGResults || 3;
    try {
        const response = await fetch(`${backendUrl}/rag-generate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({ 
                query: userMessage, 
                user_id: userId || undefined, 
                top_k: topK
            })
        });
        if (!response.body) {
            return { ragResults: [], botReply: 'AI无响应' };
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let done = false;
        let fullMsg = '';
        let hasStarted = false;
        while (!done) {
            const { value, done: doneReading } = await reader.read();
            done = doneReading;
            if (value) {
                const chunk = decoder.decode(value, { stream: true });
                chunk.split('\n').forEach(line => {
                    if (line.startsWith('data:')) {
                        const text = line.replace(/^data:/, '').trim();
                        if (text) {
                            fullMsg += text;
                            if (!hasStarted) {
                                hasStarted = true;
                                convertTypingToContentBubble();
                            }
                            updateBotTypingMessage(fullMsg);
                        }
                    }
                });
            }
        }
        return { ragResults: [], botReply: fullMsg || 'AI无响应' };
    } catch (err) {
        return { ragResults: [], botReply: '❌ 大模型生成失败：' + err.message };
    }
}

        // ✅ 修改 showTypingIndicator，创建气泡并插入打字动画
        function showTypingIndicator() {
            document.querySelectorAll('#streaming-message').forEach(el => el.remove());

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'streaming-message';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;

            typingDiv.appendChild(avatar);
            typingDiv.appendChild(messageContent);
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ✅ 新增 convertTypingToContentBubble 函数：清除typing动画，保留容器
        function convertTypingToContentBubble() {
            const typingDiv = document.getElementById('streaming-message');
            if (!typingDiv) return;

            const messageContent = typingDiv.querySelector('.message-content');
            if (!messageContent) return;

            messageContent.innerHTML = ''; // 清空动画
            typingDiv.classList.remove('typing-indicator'); // 可选：如果你用了该类
        }

        // ✅ 保持 updateBotTypingMessage 不变
        function updateBotTypingMessage(content) {
            const typingDiv = document.getElementById('streaming-message');
            if (!typingDiv) return;

            let messageContent = typingDiv.querySelector('.message-content');
            if (!messageContent) {
                messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                typingDiv.appendChild(messageContent);
            }
            const markdownHtml = marked.parse(content);
            const sanitizedHtml = DOMPurify.sanitize(markdownHtml, {
                ALLOWED_TAGS: ['p', 'br', 'strong', 'b', 'em', 'i', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'code', 'pre', 'blockquote'],
                ALLOWED_ATTR: []
            });
            messageContent.innerHTML = sanitizedHtml;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        

        // Handle send button click (流式)
        async function handleSend() {
            const message = messageInput.value.trim();
            if (!message || isTyping) return;
            addMessage('user', message);
            messageInput.value = '';
            isTyping = true;
            showTypingIndicator();
            sendButton.disabled = true;
            try {
                const result = await sendMessageToOllama(message);
                hideTypingIndicator();
                // 不再 addMessage('bot', ...)，流式内容已在streaming-message气泡中
                // 可选：如需显示ragResults，可在此处补充
            } catch (error) {
                hideTypingIndicator();
                addMessage('bot', 'Sorry, I encountered an error while processing your message. Please try again.');
                console.error('Chat error:', error);
            } finally {
                isTyping = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }
        
        // Event listeners
        sendButton.addEventListener('click', handleSend);
        
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
        
        // Minimize button event listener
        minimizeButton.addEventListener('click', function() {
            // Send message to parent window to minimize the chatbot
            window.parent.postMessage({
                type: 'MINIMIZE_CHATBOT'
            }, '*');
        });
        
        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Initial connection check
        setTimeout(checkOllamaConnection, 1000);
    </script>
</body>
</html>
