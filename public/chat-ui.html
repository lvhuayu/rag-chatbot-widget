<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }
        
        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px 20px;
            font-weight: 600;
            font-size: 16px;
            border-radius: 12px 12px 0 0;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.bot {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }
        
        .message.error .message-content {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-bottom-left-radius: 4px;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin: 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .message.user .message-avatar {
            background: #007bff;
            color: white;
            order: 2;
        }
        
        .message.bot .message-avatar {
            background: #6c757d;
            color: white;
        }
        
        .message.error .message-avatar {
            background: #dc3545;
            color: white;
        }
        
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            border-radius: 0 0 12px 12px;
        }
        
        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
        }
        
        .chat-input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
        }
        
        .send-button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 16px;
        }
        
        .send-button:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
        
        .send-button:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            margin-bottom: 15px;
            max-width: 80%;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .welcome-message {
            text-align: center;
            color: #6c757d;
            font-size: 12px;
            margin-bottom: 20px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        
        .connection-status {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            z-index: 10;
        }
        
        .connection-status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .connection-status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            AI Assistant
            <div class="connection-status" id="connectionStatus">Checking...</div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message" id="welcomeMessage">
                Loading...
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <textarea 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="Type your message..."
                    rows="1"
                ></textarea>
                <button class="send-button" id="sendButton">
                    ➤
                </button>
            </div>
        </div>
    </div>

    <script>
        let config = {};
        let isTyping = false;
        let conversationHistory = [];
        let ollamaConnected = false;
        
        // Ollama API configuration
        const OLLAMA_ENDPOINT = 'http://localhost:11434/api/chat';
        const DEFAULT_MODEL = 'mistral';
        
        // Listen for config from parent window
        window.addEventListener('message', function(event) {
            if (event.data.type === 'CHATBOT_CONFIG') {
                config = event.data.config;
                initializeChat();
            }
        });
        
        function initializeChat() {
            // Apply theme color
            if (config.theme && config.theme.primaryColor) {
                document.documentElement.style.setProperty('--primary-color', config.theme.primaryColor);
                
                // Update header and button colors
                document.querySelector('.chat-header').style.background = config.theme.primaryColor;
                document.querySelector('.send-button').style.background = config.theme.primaryColor;
                
                // Update user message color
                const style = document.createElement('style');
                style.textContent = `
                    .message.user .message-content {
                        background: ${config.theme.primaryColor} !important;
                    }
                    .message.user .message-avatar {
                        background: ${config.theme.primaryColor} !important;
                    }
                    .send-button:hover {
                        background: ${adjustBrightness(config.theme.primaryColor, -20)} !important;
                    }
                    .chat-input:focus {
                        border-color: ${config.theme.primaryColor} !important;
                        box-shadow: 0 0 0 2px ${config.theme.primaryColor}40 !important;
                    }
                `;
                document.head.appendChild(style);
            }
            
            // Set welcome message
            const welcomeMessage = document.getElementById('welcomeMessage');
            welcomeMessage.textContent = config.welcomeMessage || 'Hello! How can I help you today?';
            
            // Check Ollama connection
            checkOllamaConnection();
            
            // Setup event listeners
            setupEventListeners();
        }
        
        async function checkOllamaConnection() {
            try {
                const response = await fetch(OLLAMA_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: config.model || DEFAULT_MODEL,
                        messages: [
                            { role: "system", content: "You are a helpful assistant." },
                            { role: "user", content: "Hello" }
                        ],
                        stream: false
                    })
                });
                
                if (response.ok) {
                    ollamaConnected = true;
                    updateConnectionStatus('Connected', true);
                } else {
                    ollamaConnected = false;
                    updateConnectionStatus('Disconnected', false);
                }
            } catch (error) {
                console.warn('Ollama connection failed:', error);
                ollamaConnected = false;
                updateConnectionStatus('Disconnected', false);
            }
        }
        
        function updateConnectionStatus(status, isConnected) {
            const statusElement = document.getElementById('connectionStatus');
            statusElement.textContent = status;
            statusElement.className = `connection-status ${isConnected ? 'connected' : 'disconnected'}`;
        }
        
        function setupEventListeners() {
            const chatInput = document.getElementById('chatInput');
            const sendButton = document.getElementById('sendButton');
            const chatMessages = document.getElementById('chatMessages');
            
            // Auto-resize textarea
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            
            // Send message on Enter (but allow Shift+Enter for new line)
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // Send button click
            sendButton.addEventListener('click', sendMessage);
            
            async function sendMessage() {
                const message = chatInput.value.trim();
                if (!message || isTyping) return;
                
                // Add user message
                addMessage(message, 'user');
                
                // Clear input
                chatInput.value = '';
                chatInput.style.height = 'auto';
                
                // Show typing indicator
                showTypingIndicator();
                
                try {
                    // Send to Ollama API
                    const botResponse = await sendToOllama(message);
                    hideTypingIndicator();
                    addMessage(botResponse, 'bot');
                } catch (error) {
                    hideTypingIndicator();
                    console.error('Failed to get response from Ollama:', error);
                    addMessage('⚠️ Failed to get response from LLM. Please check if Ollama is running.', 'error');
                }
            }
        }
        
        async function sendToOllama(userMessage) {
            // Add user message to conversation history
            conversationHistory.push({ role: "user", content: userMessage });
            
            // Prepare messages for API call
            const messages = [
                { role: "system", content: "You are a helpful assistant." },
                ...conversationHistory
            ];
            
            // Limit conversation history to prevent token overflow (keep last 10 messages)
            if (conversationHistory.length > 10) {
                conversationHistory = conversationHistory.slice(-10);
            }
            
            const response = await fetch(OLLAMA_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    model: config.model || DEFAULT_MODEL,
                    messages: messages,
                    stream: false  // Ensure we get a single response, not streaming
                })
            });
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const responseText = await response.text();
            console.log('Ollama raw response:', responseText);
            
            let data;
            try {
                data = JSON.parse(responseText);
            } catch (parseError) {
                console.error('JSON parse error:', parseError);
                throw new Error(`Invalid JSON response from Ollama: ${parseError.message}`);
            }
            
            // Add bot response to conversation history
            conversationHistory.push({ role: "assistant", content: data.message.content });
            
            return data.message.content;
        }
        
        function addMessage(text, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            
            if (sender === 'user') {
                avatar.textContent = 'U';
            } else if (sender === 'bot') {
                avatar.textContent = 'AI';
            } else if (sender === 'error') {
                avatar.textContent = '⚠️';
            }
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            
            chatMessages.appendChild(messageDiv);
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function showTypingIndicator() {
            isTyping = true;
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = 'block';
            
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.appendChild(indicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function hideTypingIndicator() {
            isTyping = false;
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = 'none';
        }
        
        // Utility function to adjust color brightness
        function adjustBrightness(hex, percent) {
            const num = parseInt(hex.replace("#", ""), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
        }
    </script>
</body>
</html>
