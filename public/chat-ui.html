<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>凌问科技 - 智嵌AI客服</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    body {
      font-family: 'Rubik', sans-serif;
      background: linear-gradient(135deg, #edf2ff, #e0f7fa);
      margin: 0;
      color: #1a202c;
    }
    .chatbot-container {
        position: relative;
        width: 350px;
        height: 500px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition: all 0.3s ease;
    }
    .chatbot-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px 20px;
        border-radius: 12px 12px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chatbot-header h3 {
        font-size: 16px;
        font-weight: 600;
        margin: 0;
    }
    .chatbot-controls {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .minimize-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: all 0.3s ease;
    }
    .minimize-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
    }
    .chatbot-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f8f9fa;
    }
    .chatbot-message {
        margin-bottom: 15px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
    }
    .chatbot-message.user {
        flex-direction: row-reverse;
    }
    .message-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 12px;
        flex-shrink: 0;
    }
    .chatbot-message.user .message-avatar {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .chatbot-message.bot .message-avatar {
        background: #e5e7eb;
        color: #374151;
    }
    .message-content {
        max-width: 70%;
        padding: 10px 14px;
        border-radius: 16px;
        line-height: 1.4;
        word-wrap: break-word;
        font-size: 14px;
    }
    .message-content * {
        font-size: inherit !important;
        line-height: inherit !important;
    }
    .message-content p {
        margin: 0.5em 0;
    }
    .message-content h1, .message-content h2, .message-content h3, 
    .message-content h4, .message-content h5, .message-content h6 {
        font-size: 12px !important;
        font-weight: 600;
        margin: 0.5em 0;
    }
    .message-content ul, .message-content ol {
        margin: 0.5em 0;
        padding-left: 1.5em;
    }
    .message-content li {
        margin: 0.2em 0;
    }
    .message-content strong, .message-content b {
        font-weight: 600;
    }
    .message-content em, .message-content i {
        font-style: italic;
    }
    .chatbot-message.user .message-content {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-bottom-right-radius: 4px;
    }
    .chatbot-message.bot .message-content {
        background: white;
        color: #374151;
        border: 1px solid #e5e7eb;
        border-bottom-left-radius: 4px;
    }
    .chatbot-input {
        padding: 15px;
        background: white;
        border-top: 1px solid #e5e7eb;
        border-radius: 0 0 12px 12px;
    }
    .input-wrapper {
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .message-input {
        flex: 1;
        border: 2px solid #e5e7eb;
        border-radius: 18px;
        padding: 10px 14px;
        font-size: 16px;
        resize: none;
        outline: none;
        transition: border-color 0.3s ease;
        font-family: inherit;
        max-height: 80px;
        min-height: 36px;
        height: 36px;
    }
    .message-input:focus {
        border-color: #667eea;
    }
    .send-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }
    .send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .send-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
    .minimize-icon {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        z-index: 10001;
        transition: all 0.3s ease;
    }
    .minimize-icon:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 25px rgba(0, 0, 0, 0.2);
    }
    .typing-indicator {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 10px 14px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        max-width: 70%;
    }
    .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #9ca3af;
        animation: typing 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
        0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
    }
    .chatbot-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
    }
    .status-dot.offline {
      background: #ef4444;
    }
    .auth-indicator {
      background: rgba(34, 197, 94, 0.2);
      border-radius: 6px;
      padding: 0 6px;
      margin-left: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="chatbot-container" id="chatbot-container">
    <div class="chatbot-header">
      <h3><span id="chatbot-title-icon">🤖</span> AI 助手</h3>
      <div class="chatbot-status">
        <span class="status-dot" id="connection-status"></span>
        <span id="status-text">Connecting...</span>
        <span class="auth-indicator" id="auth-indicator" style="display:none;">🔐 Auth</span>
        <button class="minimize-btn" onclick="openLeadForm()" title="留言" style="margin-right:4px;">✍️</button>
        <button class="minimize-btn" onclick="window.parent.postMessage({ type: 'MINIMIZE_CHATBOT' }, '*')" title="最小化">−</button>
      </div>
    </div>
    <div class="chatbot-messages" id="chatbot-messages">
      <!-- 消息将在这里显示 -->
    </div>
    <div class="chatbot-input">
      <div class="input-wrapper">
        <textarea 
          id="chatbot-input" 
          class="message-input" 
          placeholder="输入您的问题..."
          rows="1"
        ></textarea>
        <button id="chatbot-send" class="send-btn">
          <svg fill="currentColor" viewBox="0 0 20 20" width="16" height="16">
            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="lead-form" style="display:none; position:absolute; inset:0; background:#fff; z-index:30; padding:18px; flex-direction:column; border-radius:12px;">
      <div style="font-weight:700; font-size:16px; margin-bottom:4px;">✍️ 给我们留言</div>
      <div style="font-size:12px; color:#888; margin-bottom:14px;">留下您的联系方式，我们会尽快联系您。</div>
      <input id="lead-name" placeholder="称呼（选填）" style="width:100%; box-sizing:border-box; border:1px solid #e5e7eb; border-radius:8px; padding:10px; margin-bottom:10px; font-size:14px;" />
      <input id="lead-contact" placeholder="联系方式：手机 / 微信 / 邮箱 *" style="width:100%; box-sizing:border-box; border:1px solid #e5e7eb; border-radius:8px; padding:10px; margin-bottom:10px; font-size:14px;" />
      <textarea id="lead-message" rows="4" placeholder="留言内容 *" style="width:100%; box-sizing:border-box; border:1px solid #e5e7eb; border-radius:8px; padding:10px; margin-bottom:8px; font-size:14px; resize:none; font-family:inherit;"></textarea>
      <div id="lead-msg" style="font-size:12px; color:#e11d48; min-height:16px; margin-bottom:8px;"></div>
      <div style="display:flex; gap:10px;">
        <button id="lead-submit" onclick="submitLead()" style="flex:1; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border:none; border-radius:8px; padding:11px; font-size:15px; cursor:pointer;">提交</button>
        <button onclick="closeLeadForm()" style="flex:0 0 auto; background:#f3f4f6; color:#444; border:none; border-radius:8px; padding:11px 18px; font-size:15px; cursor:pointer;">取消</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <script>
    marked.setOptions({
      breaks: true,
      gfm: true
    });
    const isLocalhost = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    const API_BASE_URL = isLocalhost ? "http://localhost:8001" : "https://portal.lingwenai.cn";
    // 留言接口在 uploader（门户）后端；首页在 lingwenai.cn，需绝对指向 portal（CORS 已放行 lingwenai.cn）
    const PORTAL_API = isLocalhost ? "http://localhost:5000" : "https://portal.lingwenai.cn";
    function openLeadForm(){ var f=document.getElementById('lead-form'); if(f) f.style.display='flex'; }
    function closeLeadForm(){ var f=document.getElementById('lead-form'); if(f) f.style.display='none'; var m=document.getElementById('lead-msg'); if(m) m.textContent=''; }
    async function submitLead(){
      var name=(document.getElementById('lead-name').value||'').trim();
      var contact=(document.getElementById('lead-contact').value||'').trim();
      var message=(document.getElementById('lead-message').value||'').trim();
      var out=document.getElementById('lead-msg');
      if(!apiKey){ out.textContent='未配置 apiKey，无法提交。'; return; }
      if(!contact||!message){ out.textContent='请填写联系方式和留言内容。'; return; }
      var btn=document.getElementById('lead-submit'); btn.disabled=true;
      try{
        var r=await fetch(PORTAL_API+'/api/upload/public-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:apiKey,name:name,contact:contact,message:message})});
        var d=await r.json().catch(function(){return {};});
        if(r.ok){ document.getElementById('lead-name').value=''; document.getElementById('lead-contact').value=''; document.getElementById('lead-message').value=''; closeLeadForm(); addChatMessage('bot', d.message||'留言已提交，我们会尽快联系您。'); }
        else { out.textContent=d.message||'提交失败，请稍后再试。'; }
      }catch(e){ out.textContent='提交失败，请稍后再试。'; }
      finally{ btn.disabled=false; }
    }
    let chatbotInitialized = false;
    let sending = false;
    // 新增：用于存储通过 postMessage 传递的 apiKey
    let apiKey = null;
    // 新增：用于存储通过 postMessage 传递的 welcomeMessage
    let welcomeMessage = null;
    // 多轮对话历史（基础版记忆）
    let convHistory = [];
    // 机器人头像：优先用挂件配置里传入的 avatarUrl，否则按 apiKey 拉取站点 style_config 里的头像
    let botAvatarUrl = null;
    function applyBotAvatar(el){
      if (botAvatarUrl){
        el.textContent='';
        el.style.background='transparent';
        el.style.overflow='hidden';
        var im=document.createElement('img');
        im.src=botAvatarUrl; im.alt='';
        im.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';
        el.appendChild(im);
      } else { el.textContent='🤖'; }
    }
    // 挂件配置直接传入的头像优先（如落地页指定的图标）；未传入时再按 apiKey 拉取站点 style_config 的头像
    async function loadBotAvatar(){
      if (botAvatarUrl || !apiKey) return;
      try {
        var r = await fetch(PORTAL_API+'/api/upload/public-style-config?apiKey='+encodeURIComponent(apiKey));
        if (!r.ok) return;
        var d = await r.json();
        if (d && d.style_config){ var c = JSON.parse(d.style_config); if (c.avatarUrl) botAvatarUrl = c.avatarUrl; }
      } catch(e){}
    }
    // 顶部标题旁的图标也用头像
    function applyHeaderAvatar(){
      if (!botAvatarUrl) return;
      var icon = document.getElementById('chatbot-title-icon');
      if (!icon) return;
      icon.innerHTML='';
      var im=document.createElement('img');
      im.src=botAvatarUrl; im.alt='';
      im.style.cssText='width:22px;height:22px;border-radius:50%;object-fit:cover;vertical-align:middle';
      icon.appendChild(im);
    }
    // 监听 postMessage，接收 config.apiKey 和 config.welcomeMessage
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'CHATBOT_CONFIG') {
        if (event.data.config && event.data.config.apiKey) {
          apiKey = event.data.config.apiKey;
        }
        if (event.data.config && event.data.config.welcomeMessage) {
          welcomeMessage = event.data.config.welcomeMessage;
        }
        if (event.data.config && event.data.config.avatarUrl) {
          botAvatarUrl = event.data.config.avatarUrl;
        }
        // 可选：自动初始化
        if (!chatbotInitialized) {
          initChatbot();
        }
      }
    });
    // 兜底：支持通过 URL 参数 ?apikey= 传入 apiKey（便于直接用 iframe 嵌入，无需 postMessage）
    window.addEventListener('load', function() {
      try {
        const p = new URLSearchParams(window.location.search);
        const k = p.get('apikey') || p.get('apiKey');
        if (k && !apiKey) {
          apiKey = k;
          const w = p.get('welcome');
          if (w) welcomeMessage = w;
          if (!chatbotInitialized) initChatbot();
        }
      } catch (e) {}
    });
    function updateStatus(message, type = 'info') {}
    // 连接状态检测
    function updateConnectionStatus(connected) {
      const dot = document.getElementById('connection-status');
      const text = document.getElementById('status-text');
      if (connected) {
        dot.classList.remove('offline');
        text.textContent = 'Connected';
      } else {
        dot.classList.add('offline');
        text.textContent = 'Offline';
      }
    }
    // 认证状态
    function updateAuthStatus(authenticated) {
      const auth = document.getElementById('auth-indicator');
      if (authenticated) {
        auth.style.display = '';
      } else {
        auth.style.display = 'none';
      }
    }
    async function initChatbot() {
        const chatbotContainer = document.getElementById('chatbot-container');
        chatbotContainer.style.display = 'flex';
        const messagesContainer = document.getElementById('chatbot-messages');
        messagesContainer.innerHTML = '';
        await loadBotAvatar();
        applyHeaderAvatar();
        addChatMessage('bot', welcomeMessage || '嗨，我是凌问AI小助手！\n\n我可以帮您解答一些问题， 例如：\n- 资费\n- 功能特点\n- 适用场景\n\n有问题直接问我就行，我马上告诉您！');
        chatbotInitialized = true;
    }
    function addChatMessage(sender, content) {
        const messagesContainer = document.getElementById('chatbot-messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `chatbot-message ${sender}`;
        const avatar = document.createElement('div');
        avatar.className = 'message-avatar';
        if (sender === 'user') { avatar.textContent = 'U'; } else { applyBotAvatar(avatar); }
        const messageContent = document.createElement('div');
        messageContent.className = 'message-content';
        if (sender === 'bot') {
            const markdownHtml = marked.parse(fixMarkdownList(content));
            const sanitizedHtml = DOMPurify.sanitize(markdownHtml, {
                ALLOWED_TAGS: ['p', 'br', 'strong', 'b', 'em', 'i', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'code', 'pre', 'blockquote', 'a', 'hr', 'del', 'table', 'thead', 'tbody', 'tr', 'th', 'td'],
                ALLOWED_ATTR: ['href', 'title', 'target', 'rel', 'align']
            });
            messageContent.innerHTML = sanitizedHtml;
        } else {
            messageContent.textContent = content;
        }
        messageDiv.appendChild(avatar);
        messageDiv.appendChild(messageContent);
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    function showTypingIndicator() {
        const messagesContainer = document.getElementById('chatbot-messages');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'chatbot-message bot';
        typingDiv.id = 'typing-indicator';
        const avatar = document.createElement('div');
        avatar.className = 'message-avatar';
        applyBotAvatar(avatar);
        const typingContent = document.createElement('div');
        typingContent.className = 'typing-indicator';
        typingContent.innerHTML = `
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        `;
        typingDiv.appendChild(avatar);
        typingDiv.appendChild(typingContent);
        messagesContainer.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    function hideTypingIndicator() {
        const typingIndicator = document.getElementById('typing-indicator');
        if (typingIndicator) {
            typingIndicator.remove();
        }
    }
    async function sendMessage() {
        if (sending) return;
        sending = true;
        const input = document.getElementById('chatbot-input');
        const sendBtn = document.getElementById('chatbot-send');
        const message = input.value.trim();
        if (!message || !chatbotInitialized) { sending = false; return; }
        const history = convHistory.slice(-6);
        convHistory.push({ role: 'user', content: message });
        addChatMessage('user', message);
        input.value = '';
        sendBtn.disabled = true;
        showTypingIndicator();
        try {
            // 用变量 apiKey，而不是写死
            if (!apiKey) {
                hideTypingIndicator();
                addChatMessage('bot', '未配置 apiKey，AI服务不可用。');
                sendBtn.disabled = false;
                sending = false;
                return;
            }
            let token = null;
            try {
                const tokenResp = await fetch(`${API_BASE_URL}/auth/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey })
                });
                const tokenData = await tokenResp.json();
                token = tokenData.token;
            } catch (err) {
                hideTypingIndicator();
                addChatMessage('bot', '无法获取认证token，AI服务不可用。');
                sendBtn.disabled = false;
                sending = false;
                return;
            }
            if (!token) {
                hideTypingIndicator();
                addChatMessage('bot', '认证失败，AI服务不可用。');
                sendBtn.disabled = false;
                sending = false;
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/rag-generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ query: message, top_k: 1, history })
                });
                const contentType = response.headers.get('content-type') || '';
                if (contentType.includes('text/event-stream')) {
                    if (!response.body) throw new Error('No response body');
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let done = false;
                    let fullMsg = '';
                    let messageDiv = null;
                    let messageContent = null;
                    const messagesContainer = document.getElementById('chatbot-messages');
                    while (!done) {
                        const { value, done: doneReading } = await reader.read();
                        done = doneReading;
                        if (value) {
                            const chunk = decoder.decode(value, { stream: true });
                            chunk.split('\n').forEach(line => {
                                if (line.startsWith('data:')) {
                                    const text = line.replace(/^data: ?/, '');
                                    if (text) {
                                        fullMsg += text;
                                        if (!messageDiv) {
                                            // 第一次收到内容时
                                            hideTypingIndicator();
                                            messageDiv = document.createElement('div');
                                            messageDiv.className = 'chatbot-message bot';
                                            messageDiv.id = 'streaming-message';
                                            const avatar = document.createElement('div');
                                            avatar.className = 'message-avatar';
                                            applyBotAvatar(avatar);
                                            messageContent = document.createElement('div');
                                            messageContent.className = 'message-content';
                                            messageDiv.appendChild(avatar);
                                            messageDiv.appendChild(messageContent);
                                            messagesContainer.appendChild(messageDiv);
                                        }
                                        const markdownHtml = marked.parse(fixMarkdownList(fullMsg));
                                        const sanitizedHtml = DOMPurify.sanitize(markdownHtml, {
                                            ALLOWED_TAGS: ['p', 'br', 'strong', 'b', 'em', 'i', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'code', 'pre', 'blockquote', 'a', 'hr', 'del', 'table', 'thead', 'tbody', 'tr', 'th', 'td'],
                                            ALLOWED_ATTR: ['href', 'title', 'target', 'rel', 'align']
                                        });
                                        messageContent.innerHTML = sanitizedHtml;
                                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                                    }
                                }
                            });
                        }
                    }
                    if (messageDiv) messageDiv.removeAttribute('id');
                    if (fullMsg) convHistory.push({ role: 'assistant', content: fullMsg });
                    // --- 新增：流结束后，做一次完整的markdown修正和最终渲染 ---
                    if (messageContent && fullMsg) {
                        const finalHtml = marked.parse(fixMarkdownList(fullMsg));
                        const sanitizedHtml = DOMPurify.sanitize(finalHtml, {
                            ALLOWED_TAGS: ['p', 'br', 'strong', 'b', 'em', 'i', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'code', 'pre', 'blockquote', 'a', 'hr', 'del', 'table', 'thead', 'tbody', 'tr', 'th', 'td'],
                            ALLOWED_ATTR: ['href', 'title', 'target', 'rel', 'align']
                        });
                        messageContent.innerHTML = sanitizedHtml;
                    }
                    sendBtn.disabled = false;
                    sending = false;
                    return;
                }
                // 非流式处理
                const data = await response.json();
                hideTypingIndicator();
                addChatMessage('bot', data.context || 'AI无响应');
                sendBtn.disabled = false;
                sending = false;
            } catch (error) {
                hideTypingIndicator();
                addChatMessage('bot', '抱歉，AI服务连接失败。');
                sendBtn.disabled = false;
                sending = false;
            }
        } catch (error) {
            hideTypingIndicator();
            addChatMessage('bot', '抱歉，AI服务连接失败。');
            sendBtn.disabled = false;
            sending = false;
        }
    }
    document.addEventListener('DOMContentLoaded', function() {
        const input = document.getElementById('chatbot-input');
        if (input) {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
        const sendBtn = document.getElementById('chatbot-send');
        if (sendBtn) {
            sendBtn.onclick = sendMessage;
        }
        // 默认都为已连接和已认证
        updateConnectionStatus(true);
        updateAuthStatus(true);
        // initChatbot(); // 注释掉，防止页面加载时自动显示默认欢迎语
    });
    // 让 markdown 链接在新标签打开并加 noopener（避免在 iframe 内跳走 + 安全）
    if (window.DOMPurify && DOMPurify.addHook) {
      DOMPurify.addHook('afterSanitizeAttributes', function (node) {
        if (node.tagName === 'A') {
          node.setAttribute('target', '_blank');
          node.setAttribute('rel', 'noopener noreferrer');
        }
      });
    }
    function fixMarkdownList(text) {
      if (!text || text.length < 3) return text;
      text = text.replace(/\\n/g, '\n');
      // 多个连字符的嵌套列表标记；内容为空(如 --- 分割线)时保持原样，不要变成空列表项
      text = text.replace(/^(-{2,})\s*(.*)$/gm, (m, dashes, content) => content ? `${'  '.repeat(Math.min(dashes.length, 6) - 1)}- ${content.trim()}` : m);
      // 转义 < 防止答案中的 <script> 等被当成 HTML 标签，导致后续内容被吞掉
      // （会拆连字符词、把 如需/如果 强制分段的旧启发式已移除——后端已保留真实换行）
      text = text.replace(/</g, '&lt;');
      text = text.replace(/([^\n])\n([ \t]*[-*] )/g, '$1\n\n$2');
      return text.trim();
    }
  </script>
