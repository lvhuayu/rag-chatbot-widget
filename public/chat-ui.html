<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .minimize-button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        
        .minimize-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
        
        .minimize-button svg {
            width: 16px;
            height: 16px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }
        
        .status-dot.offline {
            background: #ef4444;
        }
        
        .rag-status {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message.bot .message-avatar {
            background: #e5e7eb;
            color: #374151;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .message-content {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
        }
        
        .rag-context {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 12px;
            color: #92400e;
        }
        
        .rag-context h4 {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .rag-context p {
            margin: 2px 0;
            opacity: 0.8;
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            max-width: 70%;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
            border-radius: 0 0 12px 12px;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .message-input {
            flex: 1;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease;
            font-family: inherit;
            max-height: 100px;
            min-height: 44px;
        }
        
        .message-input:focus {
            border-color: #667eea;
        }
        
        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .send-button svg {
            width: 18px;
            height: 18px;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .rag-info {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .rag-info svg {
            width: 16px;
            height: 16px;
        }
        
        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 RAG Assistant</h2>
            <div class="header-controls">
                <div class="status-indicator">
                    <div class="status-dot" id="connection-status"></div>
                    <span id="status-text">Connecting...</span>
                    <div class="rag-status" id="rag-status">RAG</div>
                </div>
                <button class="minimize-button" id="minimize-button" title="最小化">
                    <svg fill="currentColor" viewBox="0 0 20 20" width="16" height="16">
                        <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="messages-container" id="messages-container">
            <!-- Messages will be added here -->
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="message-input" 
                    class="message-input" 
                    placeholder="Ask me anything..."
                    rows="1"
                ></textarea>
                <button id="send-button" class="send-button">
                    <svg fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let config = {};
        let conversationHistory = [];
        let isTyping = false;
        let ollamaConnected = false;
        let authToken = null;
        let userId = null;
        
        // DOM elements
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const connectionStatus = document.getElementById('connection-status');
        const statusText = document.getElementById('status-text');
        const ragStatus = document.getElementById('rag-status');
        const minimizeButton = document.getElementById('minimize-button');
        
        // Listen for configuration from parent
        window.addEventListener('message', function(event) {
            if (event.data.type === 'CHATBOT_CONFIG') {
                config = event.data.config;
                authToken = event.data.authToken;
                userId = event.data.userId;
                initializeChat();
            }
        });
        
        // Initialize chat
        function initializeChat() {
            // Apply theme
            if (config.theme && config.theme.primaryColor) {
                document.documentElement.style.setProperty('--primary-color', config.theme.primaryColor);
            }
            
            // Show welcome message
            if (config.welcomeMessage) {
                addMessage('bot', config.welcomeMessage);
            }
            
            // Check Ollama connection
            checkOllamaConnection();
            
            // Update RAG status
            updateRAGStatus();
            
            // Show authentication status
            updateAuthStatus();
        }
        
        // Check Ollama connection
        async function checkOllamaConnection() {
            try {
                const response = await fetch('http://localhost:11434/api/tags');
                if (response.ok) {
                    ollamaConnected = true;
                    updateConnectionStatus(true);
                } else {
                    updateConnectionStatus(false);
                }
            } catch (error) {
                updateConnectionStatus(false);
            }
        }
        
        // Update connection status
        function updateConnectionStatus(connected) {
            ollamaConnected = connected;
            connectionStatus.className = `status-dot ${connected ? '' : 'offline'}`;
            statusText.textContent = connected ? 'Connected' : 'Offline';
        }
        
        // Update RAG status
        function updateRAGStatus() {
            if (config.enableRAG) {
                ragStatus.textContent = 'RAG Active';
                ragStatus.style.background = 'rgba(34, 197, 94, 0.2)';
            } else {
                ragStatus.textContent = 'RAG Off';
                ragStatus.style.background = 'rgba(239, 68, 68, 0.2)';
            }
        }
        
        // Update authentication status
        function updateAuthStatus() {
            if (authToken) {
                console.log('✅ Chatbot authenticated');
                // Add auth indicator to status
                const authIndicator = document.createElement('div');
                authIndicator.className = 'rag-status';
                authIndicator.textContent = '🔐 Auth';
                authIndicator.style.background = 'rgba(34, 197, 94, 0.2)';
                authIndicator.style.marginLeft = '8px';
                
                const statusIndicator = document.querySelector('.status-indicator');
                statusIndicator.appendChild(authIndicator);
            } else {
                console.warn('⚠️ Chatbot not authenticated - some features may be limited');
            }
        }
        
        // Get authentication headers
        function getAuthHeaders() {
            const headers = {
                'Content-Type': 'application/json',
            };
            
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }
            
            return headers;
        }
        
        // Add message to chat
        function addMessage(sender, content, ragContext = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = sender === 'user' ? 'U' : '🤖';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);
            
            // Add RAG context if available
            if (ragContext && ragContext.length > 0) {
                const contextDiv = document.createElement('div');
                contextDiv.className = 'rag-context';
                contextDiv.innerHTML = `
                    <h4>🔍 RAG Context Found (${ragContext.length} sources)</h4>
                    ${ragContext.map((result, index) => 
                        `<p><strong>Source ${index + 1}:</strong> ${result.title} (${(result.similarity * 100).toFixed(1)}% match)</p>`
                    ).join('')}
                `;
                messageContent.appendChild(contextDiv);
            }
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Add to conversation history
            conversationHistory.push({
                role: sender === 'user' ? 'user' : 'assistant',
                content: content
            });
        }
        
        // Show typing indicator
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot typing-indicator';
            typingDiv.id = 'typing-indicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';
            
            const dots = document.createElement('div');
            dots.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            
            typingDiv.appendChild(avatar);
            typingDiv.appendChild(dots);
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Hide typing indicator
        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
        
        // Send message to Ollama with RAG
        async function sendMessageToOllama(userMessage) {
            try {
                let ragResults = [];
                let botReply = '';
                
                // Use configured backend URL or fallback to default
                const backendUrl = config.backendUrl || 'http://localhost:8001';
                const topK = config.maxRAGResults || 3;
                
                console.log('🔗 Sending request to:', backendUrl);
                console.log('🔐 Authentication:', authToken ? 'Authenticated' : 'Not authenticated');
                console.log('👤 User ID:', userId || 'Not provided');
                
                const response = await fetch(`${backendUrl}/search`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ 
                        query: userMessage, 
                        top_k: topK,
                        user_id: userId 
                    })
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error('Authentication failed. Please login again.');
                    } else if (response.status === 403) {
                        throw new Error('Access denied. You may not have permission to access this resource.');
                    } else {
                        throw new Error(`Backend error! Status: ${response.status}`);
                    }
                }
                
                const data = await response.json();
                console.log('RAG backend response:', data);
                
                botReply = data.context || 'No answer from backend.';
                ragResults = data.documents || [];
                
                return {
                    content: botReply,
                    ragResults: ragResults
                };
            } catch (error) {
                console.error('Error sending message to Python backend:', error);
                throw error;
            }
        }

        
        // Handle send button click
        async function handleSend() {
            const message = messageInput.value.trim();
            if (!message || isTyping) return;
            
            console.log('[User Input]', message); // Log user input
            
            // Add user message
            addMessage('user', message);
            messageInput.value = '';
            
            // Check if Ollama is connected
            if (!ollamaConnected) {
                addMessage('bot', 'Sorry, I\'m not connected to Ollama. Please make sure Ollama is running on localhost:11434.');
                return;
            }
            
            // Show typing indicator
            isTyping = true;
            showTypingIndicator();
            sendButton.disabled = true;
            
            try {
                const result = await sendMessageToOllama(message);
                hideTypingIndicator();
                addMessage('bot', result.content, result.ragResults);
                
            } catch (error) {
                hideTypingIndicator();
                addMessage('bot', 'Sorry, I encountered an error while processing your message. Please try again.');
                console.error('Chat error:', error);
            } finally {
                isTyping = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }
        
        // Event listeners
        sendButton.addEventListener('click', handleSend);
        
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
        
        // Minimize button event listener
        minimizeButton.addEventListener('click', function() {
            // Send message to parent window to minimize the chatbot
            window.parent.postMessage({
                type: 'MINIMIZE_CHATBOT'
            }, '*');
        });
        
        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Initial connection check
        setTimeout(checkOllamaConnection, 1000);
    </script>
</body>
</html>
