name: 🚀 Deploy to ECS with Strong Clone Logic

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v3

    - name: 🔐 Set up SSH key
      run: |
        set -e
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H github.com >> ~/.ssh/known_hosts
        ssh-keyscan -H ${{ secrets.ECS1_HOST }} >> ~/.ssh/known_hosts

    - name: 🚀 Deploy to ECS1
      run: |
        ssh -T ${{ secrets.ECS_USER }}@${{ secrets.ECS1_HOST }} << 'EOF'
          set -e

          echo "📦 Ensuring dependencies..."
          sudo apt update
          sudo apt install -y python3 python3-venv git curl

          DEPLOY_DIR=/opt/rag-chatbot-widget

          echo "🚀 Starting deployment to $DEPLOY_DIR"
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "📥 Cloning repository into $DEPLOY_DIR"
            sudo rm -rf $DEPLOY_DIR
            sudo mkdir -p $DEPLOY_DIR
            sudo chown -R $USER:$USER $DEPLOY_DIR
            git clone git@github.com:lvhuayu/rag-chatbot-widget.git $DEPLOY_DIR
          else
            echo "📥 Pulling latest changes"
            cd $DEPLOY_DIR
            git pull origin main
          fi

          cd $DEPLOY_DIR/backend

          if [ ! -f "requirements.txt" ]; then
            echo "❌ requirements.txt not found in backend folder!"
            pwd
            ls -la
            exit 1
          fi

          echo "🐍 Creating virtual environment..."
          python3 -m venv venv || echo "⚠️ Failed to create venv"

          echo "🧩 Ensuring pip in venv..."
          ./venv/bin/python3 -m ensurepip --upgrade || true
          ./venv/bin/python3 -m pip install --upgrade pip || true

          if [ ! -f "venv/bin/activate" ]; then
            echo "❌ Failed to find venv/bin/activate"
            ls -la venv || true
            exit 1
          fi

          source venv/bin/activate
          echo "🐍 Virtual environment activated"

          pip install -r requirements.txt
          echo "📦 Dependencies installed"

          sudo systemctl daemon-reload
          sudo systemctl restart rag-backend
          sudo systemctl status rag-backend --no-pager

          echo "🩺 Checking health endpoint..."
          curl -f http://localhost:8001/health || (echo '❌ Health check failed' && exit 1)
        EOF