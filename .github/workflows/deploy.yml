name: 🚀 Deploy to ECS Node

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v3

    - name: 🔐 Set up SSH key
      run: |
        set -e
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.ECS1_HOST }} >> ~/.ssh/known_hosts

    - name: 🚀 Deploy to ECS1
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.ECS_USER }}@${{ secrets.ECS1_HOST }} << 'EOF'
          set -e
          echo "🚀 Starting deployment on ECS1..."

          # Clone repo if needed
          if [ ! -d "/opt/rag-chatbot-widget" ]; then
            echo "📁 Creating project directory..."
            sudo mkdir -p /opt/rag-chatbot-widget
            sudo chown $USER:$USER /opt/rag-chatbot-widget
            git clone git@github.com:lvhuayu/rag-chatbot-widget.git /opt/rag-chatbot-widget
          else
            cd /opt/rag-chatbot-widget
            echo "📥 Pulling latest changes..."
            git pull origin main
          fi

          cd /opt/rag-chatbot-widget/backend

          # Ensure Python venv
          if [ ! -d "venv" ]; then
            echo "🐍 Creating virtual environment..."
            sudo apt-get update && sudo apt-get install -y python3.10-venv
            python3 -m venv venv
          fi

          source venv/bin/activate
          echo "🐍 Virtual environment activated"

          # Install Python deps
          pip install --upgrade pip
          pip install -r requirements.txt

          # Install node + npx + prisma if needed
          if ! command -v npx &> /dev/null; then
            echo "📦 Installing Node.js & Prisma..."
            curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
            sudo apt-get install -y nodejs npm
            sudo npm install -g prisma
          fi

          # Run Prisma client generation
          if [ -f "../prisma/schema.prisma" ]; then
            echo "⚙️ Running Prisma generate..."
            cd ..
            npx prisma generate || echo "⚠️ Prisma generation failed"
            cd backend
          fi

          # Restart service
          sudo systemctl daemon-reload
          sudo systemctl restart rag-backend
          echo "✅ Service restarted"

          sudo systemctl status rag-backend --no-pager
        EOF