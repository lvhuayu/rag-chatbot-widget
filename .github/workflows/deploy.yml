name: 🚀 Deploy to Multiple ECS Nodes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v3

    - name: 🔐 Set up SSH key
      run: |
        set -e
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.ECS1_HOST }} >> ~/.ssh/known_hosts

    - name: 🚀 Deploy to ECS1
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.ECS_USER }}@${{ secrets.ECS1_HOST }} << 'EOF'
          set -e
          echo "🚀 Deploying on ECS1..."

          if ! command -v git >/dev/null; then
            echo "🛠 Installing git..."
            sudo apt update && sudo apt install -y git
          fi

          if ! command -v python3 >/dev/null; then
            echo "🛠 Installing python3..."
            sudo apt install -y python3
          fi

          if ! python3 -m venv --help >/dev/null 2>&1; then
            echo "🛠 Installing python3-venv..."
            sudo apt install -y python3-venv
          fi

          if [ ! -d "/opt/rag-chatbot-widget" ]; then
            sudo mkdir -p /opt/rag-chatbot-widget
            sudo chown $USER:$USER /opt/rag-chatbot-widget
          fi

          cd /opt/rag-chatbot-widget

          if [ ! -d ".git" ]; then
            echo "📥 Cloning repo..."
            git clone git@github.com:lvhuayu/rag-chatbot-widget.git .
          else
            echo "📥 Pulling latest code..."
            git pull origin main
          fi

          cd backend

          if [ ! -d "venv" ]; then
            echo "🐍 Creating venv..."
            python3 -m venv venv
          fi

          echo "🧩 Ensuring pip in venv..."
          ./venv/bin/python -m ensurepip || true
          ./venv/bin/pip install --upgrade pip -i https://mirrors.aliyun.com/pypi/simple

          echo "📦 Installing dependencies..."
          ./venv/bin/pip install -r requirements.txt -i https://mirrors.aliyun.com/pypi/simple

          echo "🔄 Restarting service..."
          sudo systemctl daemon-reload || true
          sudo systemctl restart rag-backend

          echo "✅ Service status:"
          sudo systemctl status rag-backend --no-pager || true

          echo "🌐 Health check:"
          curl -fsSL http://localhost:8001/health || echo "❌ Health check failed"
        EOF