name: 🚀 Deploy to Multiple ECS Nodes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v3

    - name: 🔐 Set up SSH key
      run: |
        set -e
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H github.com >> ~/.ssh/known_hosts
        ssh-keyscan -H ${{ secrets.ECS1_HOST }} >> ~/.ssh/known_hosts

    - name: 🚀 Deploy to ECS1
      run: |
        ssh -T ${{ secrets.ECS_USER }}@${{ secrets.ECS1_HOST }} << 'EOF'
          set -e

          echo "📦 Ensuring dependencies are installed..."
          sudo apt update
          sudo apt install -y python3 python3-venv git curl

          echo "🚀 Starting deployment on ECS1..."

          if [ ! -d "/opt/rag-chatbot-widget/backend" ]; then
            echo "📁 Setting up project directory..."
            sudo mkdir -p /opt/rag-chatbot-widget/backend
            sudo chown -R $USER:$USER /opt/rag-chatbot-widget
          fi

          cd /opt/rag-chatbot-widget/backend
          echo "📂 Changed to backend directory"

          if [ ! -d ".git" ]; then
            echo "📥 Cloning repository..."
            git clone git@github.com:lvhuayu/rag-chatbot-widget.git .
          else
            echo "📥 Pulling latest changes..."
            git pull origin main
          fi

          echo "🐍 Checking python3..."
          which python3 || (echo "❌ python3 not found!" && exit 1)
          python3 --version || true

          echo "📦 Installing python3-venv if missing..."
          sudo apt install -y python3-venv || (echo "❌ Failed to install python3-venv" && exit 1)

          if [ ! -d "venv" ]; then
            echo "🐍 Creating virtual environment..."
            python3 -m venv venv || (echo "❌ Failed to create virtual environment" && exit 1)
          fi

          if [ ! -f "venv/bin/activate" ]; then
            echo "❌ Failed to find venv/bin/activate"
            ls -la venv || true
            exit 1
          fi

          source venv/bin/activate
          echo "🐍 Virtual environment activated"

          pip install --upgrade pip
          pip install -r requirements.txt
          echo "📦 Dependencies installed"

          echo "🔄 Reloading systemd and restarting service..."
          sudo systemctl daemon-reload
          sudo systemctl restart rag-backend
          sudo systemctl status rag-backend --no-pager

          echo "🩺 Checking health endpoint..."
          curl -f http://localhost:8001/health || (echo '❌ Health check failed' && exit 1)
        EOF