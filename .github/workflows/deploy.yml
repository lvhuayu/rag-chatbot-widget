name: 🚀 Deploy to ECS Node

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout repo
      uses: actions/checkout@v3

    - name: 🔐 Setup SSH key
      run: |
        set -e
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.ECS1_HOST }} >> ~/.ssh/known_hosts

    - name: 🚀 Deploy to ECS1
      run: |
        ssh ${{ secrets.ECS_USER }}@${{ secrets.ECS1_HOST }} << 'EOF'
          set -e
          echo "🚀 Starting deployment on ECS1..."

          # 创建目录
          if [ ! -d "/opt/rag-chatbot-widget" ]; then
            echo "📁 Creating project directory..."
            sudo mkdir -p /opt/rag-chatbot-widget
            sudo chown $USER:$USER /opt/rag-chatbot-widget
          fi

          cd /opt/rag-chatbot-widget

          # 克隆或更新仓库
          if [ ! -d ".git" ]; then
            echo "📥 Cloning repository..."
            git clone https://github.com/lvhuayu/rag-chatbot-widget.git .
          else
            echo "📥 Pulling latest changes..."
            git pull origin main
          fi

          # 安装 python3-venv（确保可以创建虚拟环境）
          sudo apt-get update
          sudo apt-get install -y python3-venv python3.10-venv

          # 创建虚拟环境
          if [ ! -d "backend/venv" ]; then
            echo "🐍 Creating virtual environment..."
            python3 -m venv backend/venv
          fi

          source backend/venv/bin/activate
          echo "🐍 Virtual environment activated"

          # 升级 pip
          pip install --upgrade pip -i https://mirrors.aliyun.com/pypi/simple

          # 安装依赖
          pip install -r backend/requirements.txt -i https://mirrors.aliyun.com/pypi/simple
          echo "📦 Python dependencies installed"

          # 安装 Node.js 和 Prisma（用于 npx prisma generate）
          if ! command -v npx &> /dev/null; then
            curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
            sudo apt-get install -y nodejs
            sudo npm install -g prisma
          fi

          # 生成 Prisma 客户端
          cd backend
          npx prisma generate --schema=../prisma/schema.prisma
          cd ..

          # 重启 systemd 服务
          sudo systemctl daemon-reload
          sudo systemctl restart rag-backend
          echo "✅ Service restarted"

          # 检查状态
          sudo systemctl status rag-backend --no-pager
        EOF