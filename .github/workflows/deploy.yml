name: 🚀 Deploy to Multiple ECS Nodes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v3

    - name: 🔐 Set up SSH key
      run: |
        set -e
        set -x
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.ECS1_HOST }} >> ~/.ssh/known_hosts
        ssh-keyscan -H github.com >> ~/.ssh/known_hosts

    - name: 🚀 Deploy to ECS1
      run: |
        ssh -T ${{ secrets.ECS_USER }}@${{ secrets.ECS1_HOST }} << 'EOF'
          set -e
          echo "🚀 Starting deployment on ECS1..."

          if [ ! -d "/opt/rag-chatbot-widget" ]; then
            echo "📁 Creating project directory..."
            sudo mkdir -p /opt/rag-chatbot-widget
            sudo chown $USER:$USER /opt/rag-chatbot-widget
          fi

          if [ ! -d "/opt/rag-chatbot-widget/backend" ]; then
            echo "📁 Creating backend directory..."
            mkdir -p /opt/rag-chatbot-widget/backend
          fi

          cd /opt/rag-chatbot-widget/backend
          echo "📂 Changed to backend directory"

          if [ ! -d ".git" ]; then
            echo "📥 Cloning repository..."
            git clone git@github.com:lvhuayu/rag-chatbot-widget.git .
          else
            echo "📥 Pulling latest changes..."
            git pull origin main
          fi

          if [ ! -d "venv" ]; then
            echo "🐍 Creating virtual environment..."
            python3 -m venv venv
          fi

          source venv/bin/activate
          echo "🐍 Virtual environment activated"

          pip install --upgrade pip
          pip install -r requirements.txt
          echo "📦 Dependencies installed"

          sudo systemctl daemon-reload
          echo "🔄 Systemd daemon reloaded"

          sudo systemctl restart rag-backend
          echo "✅ Service restarted"

          # 健康检查
          sleep 3
          curl -f http://localhost:8001/health || (echo "❌ Health check failed" && exit 1)

          sudo systemctl is-active --quiet rag-backend && echo "✅ Service is running." || (echo "❌ Service failed to start." && exit 1)
        EOF

    - name: ✅ Deployment to ECS1 complete
      if: success()
      run: echo "✅ All deployment steps to ECS1 completed successfully."
