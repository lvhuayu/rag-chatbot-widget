name: 🚀 Deploy to ECS Nodes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout repo
      uses: actions/checkout@v3

    - name: 🔐 Setup SSH key
      run: |
        set -eux
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.ECS1_HOST }} >> ~/.ssh/known_hosts

    - name: 🚀 Deploy to ECS1
      run: |
        ssh ${{ secrets.ECS_USER }}@${{ secrets.ECS1_HOST }} << 'EOF'
          set -eux
          echo "🚀 Deploying to ECS1"

          # Clone or update repo
          if [ ! -d "/opt/rag-chatbot-widget" ]; then
            sudo mkdir -p /opt/rag-chatbot-widget
            sudo chown $USER:$USER /opt/rag-chatbot-widget
            git clone git@github.com:lvhuayu/rag-chatbot-widget.git /opt/rag-chatbot-widget
          else
            cd /opt/rag-chatbot-widget
            git pull origin main
          fi

          cd /opt/rag-chatbot-widget/backend

          # Install Python venv if needed
          sudo apt-get update -y
          sudo apt-get install -y python3.10-venv

          # Create venv
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi

          source venv/bin/activate
          python -m pip install --upgrade pip -i https://mirrors.aliyun.com/pypi/simple
          pip install -r requirements.txt -i https://mirrors.aliyun.com/pypi/simple

          # Install Node.js and Prisma
          if ! command -v npx &> /dev/null; then
            curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
            sudo apt-get install -y nodejs
            sudo npm install -g prisma
          fi

          # Prisma generate
          cd /opt/rag-chatbot-widget/backend
          npx prisma generate

          # Restart service
          sudo systemctl daemon-reload
          sudo systemctl restart rag-backend
          sudo systemctl status rag-backend --no-pager
        EOF

